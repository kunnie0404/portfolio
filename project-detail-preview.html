<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目详情预览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        background: #000;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .spotlight-cursor {
        position: fixed;
        inset: 0;
        z-index: 9999;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      @media (pointer: coarse), (prefers-reduced-motion: reduce) {
        .spotlight-cursor {
          display: none;
        }
      }

      .detail-header {
        position: fixed;
        top: 16px;
        left: 0;
        width: 100%;
        height: 42px;
        z-index: 100;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        padding: 0 16px;
        color: #fff;
        pointer-events: none;
      }

      .back-link,
      .detail-nav-links,
      .detail-email {
        pointer-events: auto;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 999px;
        background:
          radial-gradient(circle at 14% 0%, rgba(255, 255, 255, 0.2), transparent 38%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.035) 48%, rgba(0, 0, 0, 0.12)),
          rgba(8, 8, 8, 0.42);
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.2),
          inset 1px 1px 0 rgba(255, 255, 255, 0.3),
          inset -1px -1px 0 rgba(255, 255, 255, 0.07),
          inset 0 0 18px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px) saturate(165%) contrast(105%);
        -webkit-backdrop-filter: blur(20px) saturate(165%) contrast(105%);
      }

      .detail-nav-links {
        position: relative;
        display: flex;
        align-items: center;
        grid-column: 2;
        justify-self: center;
        height: 100%;
        padding: 3px;
        gap: 3px;
        overflow: hidden;
        isolation: isolate;
        background: rgba(8, 8, 8, 0.16);
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.28),
          0 0 18px rgba(255, 255, 255, 0.08),
          inset 3px 3px 1px -3px rgba(255, 255, 255, 0.72),
          inset -3px -3px 1px -3px rgba(255, 255, 255, 0.42),
          inset 1px 1px 1px rgba(255, 255, 255, 0.18),
          inset -1px -1px 1px rgba(0, 0, 0, 0.34),
          inset 0 0 12px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px) saturate(185%) contrast(108%);
        -webkit-backdrop-filter: blur(24px) saturate(185%) contrast(108%);
      }

      .liquid-glass-nav-backdrop,
      .liquid-glass-nav-surface {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
      }

      .liquid-glass-nav-backdrop {
        z-index: 0;
        background:
          radial-gradient(circle at 18% -40%, rgba(255, 255, 255, 0.34), transparent 46%),
          linear-gradient(112deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.025) 46%, rgba(255, 255, 255, 0.1));
        filter: url("#project-nav-liquid-glass");
        opacity: 0.92;
      }

      .liquid-glass-nav-surface {
        z-index: 1;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.018) 52%, rgba(0, 0, 0, 0.08)),
          rgba(15, 15, 15, 0.12);
      }

      .liquid-glass-nav-filter {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .detail-nav-links a {
        position: relative;
        height: 100%;
        display: inline-flex;
        align-items: center;
        padding: 0 18px;
        overflow: hidden;
        border-radius: 999px;
        background: transparent;
        color: #fff;
        font-size: 12px;
        line-height: 16px;
        font-weight: 500;
        text-transform: uppercase;
        font-weight: 600;
        z-index: 2;
        transition: color 280ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .detail-nav-links a::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -32px;
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: #fff;
        transform: translateX(-50%) scale(0);
        transform-origin: 50% 100%;
        transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .detail-nav-links a:hover,
      .detail-nav-links a:focus-visible {
        color: #000;
        outline: none;
      }

      .detail-nav-links a:hover::before,
      .detail-nav-links a:focus-visible::before {
        transform: translateX(-50%) scale(1.45);
      }

      .detail-nav-links a span,
      .detail-nav-links a {
        isolation: isolate;
      }

      .back-link {
        grid-column: 1;
        justify-self: start;
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.1);
        color: rgba(255, 255, 255, 0.84);
        transition: color 180ms ease, transform 220ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        background-color: rgba(255, 255, 255, 0.14);
        color: #fff;
        transform: translateX(-2px) scale(1.04);
        outline: none;
      }

      .detail-email {
        position: relative;
        grid-column: 3;
        justify-self: end;
        height: 42px;
        display: inline-flex;
        align-items: center;
        padding: 0 18px;
        overflow: hidden;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        isolation: isolate;
        transition: color 280ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .detail-email::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -32px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: #fff;
        transform: translateX(-50%) scale(0);
        transform-origin: 50% 100%;
        transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .detail-email:hover,
      .detail-email:focus-visible {
        color: #000;
        outline: none;
      }

      .detail-email:hover::before,
      .detail-email:focus-visible::before {
        transform: translateX(-50%) scale(1.8);
      }

      .detail-email span {
        position: relative;
        z-index: 1;
      }

      .return-icon {
        width: 36px;
        height: 36px;
        display: block;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }

      h1 {
        margin: 0;
        padding: 0 14px 0 12px;
        color: #fff;
        font-size: 12px;
        line-height: 16px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: right;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .gallery {
        width: 100%;
        padding-top: 0;
        line-height: 0;
      }

      .gallery img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
        content-visibility: auto;
        contain-intrinsic-size: auto 1000px;
      }

      .motion-gallery-view {
        min-height: 100vh;
        padding: 104px 0 48px;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.12), transparent 28rem),
          #050505;
        color: #fff;
        line-height: normal;
      }

      .motion-heading {
        width: 92vw;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: end;
        column-gap: 24px;
      }

      .motion-heading p,
      .motion-heading span {
        margin: 0;
        color: rgba(255, 255, 255, 0.48);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .motion-heading h2 {
        grid-row: 2;
        margin: 4px 0 0;
        font-family: Figtree, Arial, sans-serif;
        font-size: clamp(34px, 5vw, 76px);
        line-height: 0.95;
        font-weight: 500;
        letter-spacing: -0.05em;
      }

      .motion-heading span {
        grid-column: 2;
        grid-row: 2;
        padding-bottom: 7px;
      }

      .motion-scroller {
        width: 92vw;
        margin-top: clamp(160px, 24vh, 300px);
        margin-right: auto;
        margin-left: auto;
      }

      .motion-track {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 16px;
      }

      .motion-card {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        background: #111;
        content-visibility: auto;
        contain-intrinsic-size: 1px 200px;
      }

      .motion-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        pointer-events: none;
      }

      .watch-face-section {
        width: 92vw;
        margin: clamp(110px, 16vh, 220px) auto 0;
      }

      .watch-face-section h3 {
        margin: 0 0 clamp(34px, 5vw, 72px);
        color: #fff;
        font-family: Figtree, Arial, sans-serif;
        font-size: clamp(34px, 5vw, 76px);
        line-height: 0.95;
        font-weight: 500;
        letter-spacing: -0.05em;
      }

      .watch-face-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 16px;
      }

      .watch-face-card {
        width: 100%;
        aspect-ratio: 1;
        margin: 0;
        display: grid;
        place-items: center;
        content-visibility: auto;
        contain-intrinsic-size: 1px 200px;
      }

      .watch-face-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .other-showcase-gallery {
        width: 100%;
        margin-top: clamp(110px, 16vh, 220px);
        line-height: 0;
      }

      .other-showcase-gallery img {
        display: block;
        width: 100%;
        max-width: none;
        height: auto;
        margin: 0;
        content-visibility: auto;
        contain-intrinsic-size: auto 1000px;
      }

      .error {
        min-height: 60vh;
        display: grid;
        place-items: center;
        padding: 32px;
        color: #fff;
        text-align: center;
      }

      @media (max-width: 680px) {
        .detail-header {
          top: 8px;
          left: 0;
          width: 100%;
          height: 42px;
          padding: 0 8px;
        }

        .detail-nav-links,
        .detail-email {
          display: none;
        }

        .return-icon {
          width: 36px;
          height: 36px;
        }

        .gallery {
          padding-top: 0;
        }

        .motion-gallery-view {
          padding: 84px 0 32px;
        }

        .motion-heading {
          width: 92vw;
        }

        .motion-heading span {
          display: none;
        }

        .motion-card {
          width: 100%;
          border-radius: 50%;
        }

        .motion-scroller {
          margin-top: clamp(96px, 18vh, 160px);
        }

        .motion-track {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .watch-face-section {
          margin-top: clamp(80px, 13vh, 130px);
        }

        .watch-face-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <canvas class="spotlight-cursor" data-spotlight-cursor data-radius="200" data-brightness="0.14" data-smoothing="0.12" aria-hidden="true"></canvas>
    <header class="detail-header">
      <a class="back-link" href="reference-dino-preview.html#portfolio-collection" aria-label="返回项目目录">
        <img class="return-icon" src="public/portfolio-assets/return.svg" alt="" aria-hidden="true">
      </a>
      <nav class="detail-nav-links" aria-label="项目页面导航">
        <span class="liquid-glass-nav-backdrop" aria-hidden="true"></span>
        <span class="liquid-glass-nav-surface" aria-hidden="true"></span>
        <a href="reference-dino-preview.html#works"><span>Home</span></a>
        <a href="reference-dino-preview.html#portfolio-collection"><span>Work</span></a>
        <a href="reference-dino-preview.html#about"><span>About</span></a>
        <a href="reference-dino-preview.html#about"><span>Contact</span></a>
        <svg class="liquid-glass-nav-filter" aria-hidden="true">
          <defs>
            <filter id="project-nav-liquid-glass" x="-20%" y="-50%" width="140%" height="200%" color-interpolation-filters="sRGB">
              <feTurbulence type="fractalNoise" baseFrequency="0.018 0.12" numOctaves="1" seed="7" result="turbulence"></feTurbulence>
              <feGaussianBlur in="turbulence" stdDeviation="1.6" result="blurredNoise"></feGaussianBlur>
              <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="42" xChannelSelector="R" yChannelSelector="B" result="displaced"></feDisplacementMap>
              <feGaussianBlur in="displaced" stdDeviation="0.65"></feGaussianBlur>
            </filter>
          </defs>
        </svg>
      </nav>
      <a class="detail-email" href="mailto:1827617577@qq.com"><span>1827617577@qq.com</span></a>
      <h1 id="projectTitle" class="visually-hidden">项目详情</h1>
    </header>
    <main id="gallery" class="gallery" aria-live="polite"></main>

    <script src="public/spotlight-cursor.js"></script>
    <script>
      const projects = {
        echos: { name: "Echos", prefix: "echos", start: 1, end: 12 },
        "mo-glass": { name: "MO GLASS", prefix: "moglass", start: 1, end: 12 },
        "da-ring": { name: "Da Ring", prefix: "daring", start: 1, end: 9 },
        luxury: { name: "Luxury", prefix: "Luxury", start: 9, end: 14 },
        neon: { name: "NEON", prefix: "neon", start: 3, end: 8 },
        other: { name: "Dynamic Effect", type: "motion", start: 1, end: 13 },
      };

      const slug = new URLSearchParams(window.location.search).get("project");
      const project = projects[slug];
      const title = document.querySelector("#projectTitle");
      const gallery = document.querySelector("#gallery");

      if (!project) {
        document.title = "项目不存在";
        title.textContent = "项目不存在";
        gallery.className = "error";
        gallery.textContent = "请返回项目目录并选择一个作品。";
      } else {
        document.title = `${project.name} - 项目详情预览`;
        title.textContent = project.name;
        gallery.setAttribute("aria-label", `${project.name} 项目图片`);

        if (project.type === "motion") {
          gallery.className = "gallery motion-gallery-view";
          gallery.innerHTML = `
            <section class="motion-heading" aria-labelledby="motionTitle">
              <p>Other / Motion Studies</p>
              <h2 id="motionTitle">Dynamic Effect</h2>
              <span>13 Motion Studies</span>
            </section>
            <div class="motion-scroller" role="region" aria-label="动效网格展示，共 13 项">
              <div class="motion-track"></div>
            </div>
            <section class="watch-face-section" aria-labelledby="classicTitle">
              <h3 id="classicTitle">Classic Watch Faces</h3>
              <div class="watch-face-grid classic-watch-face-grid"></div>
            </section>
            <section class="watch-face-section" aria-labelledby="digitalTitle">
              <h3 id="digitalTitle">Digital Watch Faces</h3>
              <div class="watch-face-grid digital-watch-face-grid"></div>
            </section>
            <div class="other-showcase-gallery" aria-label="其他视觉作品展示"></div>
          `;

          const track = gallery.querySelector(".motion-track");
          const classicTrack = gallery.querySelector(".classic-watch-face-grid");
          const digitalTrack = gallery.querySelector(".digital-watch-face-grid");
          const showcaseGallery = gallery.querySelector(".other-showcase-gallery");

          for (let number = project.start; number <= project.end; number += 1) {
            const item = document.createElement("figure");
            const image = document.createElement("img");
            const index = String(number).padStart(2, "0");

            item.className = "motion-card";
            image.src = `public/portfolio-assets/other/motion-${index}.webp`;
            image.alt = `动效作品 ${number}`;
            image.draggable = false;
            image.loading = number <= 2 ? "eager" : "lazy";
            image.decoding = "async";
            item.append(image);
            track.appendChild(item);
          }

          const appendWatchFaces = (target, folder, prefix, count, label) => {
            for (let number = 1; number <= count; number += 1) {
              const item = document.createElement("figure");
              const image = document.createElement("img");
              const index = String(number).padStart(2, "0");

              item.className = "watch-face-card";
              image.src = `public/portfolio-assets/other/${folder}/${prefix}-${index}.webp`;
              image.alt = `${label} ${number}`;
              image.loading = "lazy";
              image.decoding = "async";
              image.draggable = false;
              item.append(image);
              target.appendChild(item);
            }
          };

          appendWatchFaces(classicTrack, "classic", "classic", 29, "Classic Watch Faces");
          appendWatchFaces(digitalTrack, "digital", "digital", 26, "Digital Watch Faces");

          for (let number = 1; number <= 9; number += 1) {
            const image = document.createElement("img");
            const index = String(number).padStart(2, "0");

            image.src = `public/portfolio-assets/other/showcase/showcase-${index}.webp`;
            image.alt = `其他视觉作品 ${number}`;
            image.loading = "lazy";
            image.decoding = "async";
            showcaseGallery.appendChild(image);
          }

        } else {
          for (let number = project.start; number <= project.end; number += 1) {
            const image = document.createElement("img");
            image.src = `public/portfolio-assets/projects/${slug}/${project.prefix}_${number}.webp`;
            image.alt = `${project.name} 项目展示 ${number - project.start + 1}`;
            image.loading = number === project.start ? "eager" : "lazy";
            image.decoding = "async";
            if (number === project.start) image.fetchPriority = "high";
            gallery.appendChild(image);
          }
        }
      }
    </script>
  </body>
</html>
